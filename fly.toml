# Имя приложения замени на своё уникальное (fly launch спросит сам,
# либо поменяй здесь и в команде `fly apps create`).
app = "cs2-watch-bot"
primary_region = "waw"  # Варшава — обычно ближе всего из Казахстана; можно поменять

[build]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "cs2bot_data"
  destination = "/data"

# Никакого [[services]] и http-чеков намеренно нет: это фоновый процесс
# (polling), а не веб-сервер. Fly не будет "усыплять" машину из-за
# отсутствия http-трафика, потому что тут нет http-трафика по определению.
