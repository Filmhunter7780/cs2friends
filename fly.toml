# fly.toml app configuration file generated for cs2friends on 2026-07-10T16:01:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cs2friends'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'cs2bot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
